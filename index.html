<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>给小乖的告白</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fecfef);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "微软雅黑", sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 飘落爱心 */
    .heart-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .heart-fall {
      position: absolute;
      top: -20px;
      width: 14px;
      height: 14px;
      background: #ff5e7d;
      border-radius: 50% 50% 0 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .content {
      text-align: center;
      z-index: 10;
      padding: 20px;
    }
    .title {
      font-size: 36px;
      color: #fff;
      text-shadow: 0 0 10px #ff477e;
      margin-bottom: 20px;
    }
    .big-heart {
      font-size: 90px;
      cursor: pointer;
      margin: 20px 0;
    }
    .beat {
      animation: beat 0.6s ease-in-out;
    }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .text {
      font-size: 18px;
      color: #fff;
      margin: 15px 0 30px;
      line-height: 1.6;
    }
    .btns {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .yes {
      background: #ff477e;
      color: white;
    }
    .no {
      background: #ccc;
      position: relative;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
    }
    .modal-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }
    .modal-box h2 {
      color: #ff477e;
      margin-bottom: 10px;
    }
    .modal-box button {
      margin-top: 20px;
      padding: 8px 16px;
      background: #ff477e;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="heart-container" id="heartBox"></div>

  <div class="content">
    <h1 class="title">💖 小乖，我喜欢你</h1>
    <div class="big-heart" id="bigHeart" onclick="beatHeart()">❤️</div>
    <p class="text" id="sayLove">
      遇见你之后，万物皆甜<br>
      想把所有温柔和偏爱，都给你一个人
    </p>

    <div class="btns">
      <button class="btn yes" onclick="sayYes()">我愿意</button>
      <button class="btn no" id="noBtn" onmouseover="moveNo()" onclick="sayNo()">我不要</button>
    </div>
  </div>

  <script>
    // 爱心飘落
    const heartBox = document.getElementById('heartBox')
    for (let i = 0; i < 30; i++) {
      let h = document.createElement('div')
      h.className = 'heart-fall'
      h.style.left = Math.random() * 100 + '%'
      h.style.animationDelay = Math.random() * 5 + 's'
      h.style.animationDuration = 5 + Math.random() * 5 + 's'
      heartBox.appendChild(h)
    }

    // 心跳
    function beatHeart() {
      let h = document.getElementById('bigHeart')
      h.classList.add('beat')
      setTimeout(() => h.classList.remove('beat'), 600)
    }

    // 拒绝按钮乱跑
    function moveNo() {
      let btn = document.getElementById('noBtn')
      let x = Math.random() * 200 - 100
      let y = Math.random() * 200 - 100
      btn.style.transform = `translate(${x}px, ${y}px)`
    }

    function sayNo() {
      document.getElementById('sayLove').innerText = '小乖，再考虑一下嘛～我超认真的！'
    }

    // 同意
    function sayYes() {
      let modal = document.createElement('div')
      modal.className = 'modal'
      modal.innerHTML = `
        <div class="modal-box">
          <h2>🎉 太好了，小乖！</h2>
          <p>往后余生，皆是你～</p>
          <button onclick="this.parentElement.parentElement.remove()">关闭</button>
        </div>
      `
      document.body.appendChild(modal)
    }
  </script>
</body>
</html>
